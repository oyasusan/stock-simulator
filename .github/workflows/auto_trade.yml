name: Auto Trader Bot

# スケジュール実行は cron-job.org から workflow_dispatch で行う
# cron-job.org 設定:
#   URL    : https://api.github.com/repos/oyasusan/stock-simulator/actions/workflows/auto_trade.yml/dispatches
#   Method : POST
#   Headers: Authorization: Bearer {GITHUB_TOKEN}
#            Accept: application/vnd.github+json
#            Content-Type: application/json
#            X-GitHub-Api-Version: 2022-11-28
#   Body   : {"ref":"main","inputs":{"mode":"auto_trade","ticker":"","qty":"1","position_id":"0"}}
#   Cron   : */15 9-15 * * 1-5  (Asia/Tokyo)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        type: choice
        options: [auto_trade, manual_buy, manual_sell]
        default: auto_trade
        required: true
      ticker:
        description: '銘柄コード (例: 4385.T)  ※manual_buy のみ'
        type: string
        default: ''
      qty:
        description: 'ロット数  ※manual_buy のみ'
        type: number
        default: 1
      position_id:
        description: 'ポジション ID  ※manual_sell のみ'
        type: number
        default: 0

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── data.db を finance-system リポジトリから取得 ──────────────────
      - name: Download data.db from finance-system
        env:
          GH_TOKEN: ${{ secrets.GH_FINANCE_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, json, base64, urllib.request, urllib.error, sqlite3, subprocess, shutil

          token = os.environ.get("GH_TOKEN", "")
          repo  = "oyasusan/finance-system"

          def auth_headers() -> dict:
              h = {"Accept": "application/vnd.github+json"}
              if token:
                  h["Authorization"] = f"Bearer {token}"
              return h

          def fetch_via_contents_api() -> bytes:
              """1MB未満のファイル向け: Contents API (base64)"""
              url = f"https://api.github.com/repos/{repo}/contents/data.db"
              req = urllib.request.Request(url, headers=auth_headers())
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
              content = data.get("content")
              if not content:
                  raise ValueError("content が空です（ファイルが 1MB 超の可能性）")
              return base64.b64decode(content.replace("\n", ""))

          def fetch_via_raw_url() -> bytes:
              """1MB超のファイル向け: raw URL から直接ダウンロード"""
              url = f"https://raw.githubusercontent.com/{repo}/main/data.db"
              req = urllib.request.Request(url, headers=auth_headers())
              with urllib.request.urlopen(req) as resp:
                  return resp.read()

          def validate_db(path: str) -> bool:
              try:
                  conn = sqlite3.connect(path)
                  count = conn.execute("SELECT COUNT(*) FROM quotes").fetchone()[0]
                  conn.close()
                  return count > 0
              except Exception:
                  return False

          def restore_committed():
              print("コミット済みの data.db を使用します", file=sys.stderr)
              subprocess.run(["git", "checkout", "HEAD", "--", "data.db"], check=True)

          try:
              try:
                  db_bytes = fetch_via_contents_api()
                  print(f"Contents API でダウンロード完了: {len(db_bytes):,} bytes")
              except (urllib.error.HTTPError, ValueError) as e:
                  print(f"Contents API 失敗 ({e})、Raw URL で再試行します", file=sys.stderr)
                  db_bytes = fetch_via_raw_url()
                  print(f"Raw URL でダウンロード完了: {len(db_bytes):,} bytes")

              tmp_path = "data_downloaded.db"
              with open(tmp_path, "wb") as f:
                  f.write(db_bytes)

              if validate_db(tmp_path):
                  shutil.move(tmp_path, "data.db")
                  print("data.db 検証OK: quotes テーブルを確認")
              else:
                  os.remove(tmp_path)
                  print("data.db 検証失敗: quotes テーブルが見つかりません", file=sys.stderr)
                  restore_committed()

          except Exception as e:
              print(f"data.db 取得失敗: {e}", file=sys.stderr)
              restore_committed()
          PYEOF

      # ── watchlist.json を finance-system リポジトリから取得 ────────────
      - name: Download watchlist.json from finance-system
        env:
          GH_TOKEN: ${{ secrets.GH_FINANCE_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, json, base64, urllib.request, urllib.error

          token = os.environ.get("GH_TOKEN", "")
          repo  = "oyasusan/finance-system"
          url   = f"https://api.github.com/repos/{repo}/contents/watchlist.json"

          def fetch(with_token: bool) -> str:
              headers = {"Accept": "application/vnd.github+json"}
              if with_token and token:
                  headers["Authorization"] = f"Bearer {token}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
              return base64.b64decode(data["content"].replace("\n", "")).decode()

          try:
              try:
                  content = fetch(with_token=True)
              except urllib.error.HTTPError as e:
                  if e.code == 401 and token:
                      print(f"トークン認証失敗 (401)、認証なしで再試行します", file=sys.stderr)
                      content = fetch(with_token=False)
                  else:
                      raise
              with open("watchlist.json", "w", encoding="utf-8") as f:
                  f.write(content)
              print("watchlist.json ダウンロード完了")
          except Exception as e:
              print(f"watchlist.json 取得スキップ: {e}", file=sys.stderr)
          PYEOF

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 自動売買 ─────────────────────────────────────────────────────
      - name: Run auto trader
        if: ${{ github.event.inputs.mode == 'auto_trade' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python auto_trader.py

      # ── 手動買い ─────────────────────────────────────────────────────
      - name: Execute manual buy
        if: ${{ github.event.inputs.mode == 'manual_buy' }}
        env:
          TICKER: ${{ github.event.inputs.ticker }}
          QTY:    ${{ github.event.inputs.qty }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python manual_trade.py buy "$TICKER" "$QTY"

      # ── 手動売り ─────────────────────────────────────────────────────
      - name: Execute manual sell
        if: ${{ github.event.inputs.mode == 'manual_sell' }}
        env:
          POSITION_ID: ${{ github.event.inputs.position_id }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python manual_trade.py sell "$POSITION_ID"

      # ── コミット＆プッシュ ───────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add simulator.db data.db watchlist.json
          if git diff --staged --quiet; then
            echo "変更なし、スキップ"
            exit 0
          fi
          MODE="${{ github.event.inputs.mode || 'auto_trade' }}"
          TICKER="${{ github.event.inputs.ticker }}"
          LABEL="${TICKER:+ $TICKER}"
          git commit -m "auto(${MODE}): シミュレーター更新${LABEL} $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push
